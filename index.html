        function checkStatus() {
            const name = document.getElementById("name").value.trim();
            if (!purchases[name]) {
            document.getElementById("result").innerHTML = "查無此名字，請檢查輸入是否正確~";
            return;
        }
            showPurchases(name);
        }
        function showPurchases(name) {
            const records = purchases[name];
            let html = `<h2>${name} 的購買記錄：</h2>`;
            if (!records || records.length === 0) {
                html += "<p>暫無記錄。</p>";
            } 
                else {
                html += "<table border='1' style='margin: 0 auto; color: white;'>";
                html += "<tr><th>下單日期</th><th>物品</th><th>狀態</th><th>重量</th><th>二補💰</th><th>備註</th></tr>";
                records.forEach(record => {
                    const date = record.date !== undefined ? record.date : "暫無";
                    const item = record.item !== undefined ? record.item : "暫無";
                    const status = record.status !== undefined ? record.status : "暫無";
                    const weight = record.weight !== undefined ? record.weight : "暫無";
                    const shippingCost = record.shippingCost !== undefined ? record.shippingCost : "暫無";
                    const note = record.note !== undefined ? record.note : "暫無";
                    html += `<tr>
                                <td>${date}</td>
                                <td>${item}</td>
                                <td>${status}</td>
                                <td>${weight}</td>
                                <td>${shippingCost}</td>
                                <td>${note}</td>
                            </tr>`;
                });
                html += "</table>";
            }
            document.getElementById("result").innerHTML = html;
